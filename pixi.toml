[workspace]
authors = ["Dave Barry <david.barry@crick.ac.uk>"]
channels = ["conda-forge"]
name = "hiv-quant"
platforms = ["linux-64", "win-64"]
version = "0.1.0"

[tasks]

[dependencies]
python = ">=3.14.6,<3.15"
pixi-pycharm = ">=0.0.12,<0.0.13"

[environments]
hiv = ["default"]

[pypi-dependencies]
numpy = ">=2.5.1, <3"
pandas = ">=3.0.3, <4"
scipy = ">=1.18.0, <2"
bioio = ">=3.4.0, <4"
matplotlib = ">=3.11.1, <4"
scikit-image = ">=0.26.0, <0.27"
